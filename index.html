<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#172554">
  <title>스쿨스페이스 | 특별실 예약</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <a class="brand" href="#" data-page="dashboard" aria-label="스쿨스페이스 홈">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 19.5V8.8L12 4l8 4.8v10.7M8 20v-6h8v6M2.5 20h19"/></svg>
        </span>
        <span><strong>스쿨스페이스</strong><small>SCHOOL SPACE</small></span>
      </a>

      <nav class="nav" aria-label="주 메뉴">
        <p class="nav-label">MENU</p>
        <button class="nav-item active" data-page="dashboard"><span>⌂</span> 대시보드</button>
        <button class="nav-item" data-page="rooms"><span>▦</span> 특별실 찾기</button>
        <button class="nav-item" data-page="calendar"><span>□</span> 예약 캘린더</button>
        <button class="nav-item" data-page="my"><span>◷</span> 내 예약</button>
        <div class="role-nav teacher-only">
          <p class="nav-label">MANAGEMENT</p>
          <button class="nav-item" data-page="approval"><span>✓</span> 예약 승인 <b id="approvalBadge">2</b></button>
          <button class="nav-item admin-only" data-page="admin"><span>⌘</span> 시설 관리</button>
        </div>
      </nav>

      <div class="sidebar-help">
        <span>?</span>
        <div><strong>도움이 필요하신가요?</strong><small>행정실 내선 204</small></div>
      </div>
      <div class="sidebar-profile">
        <span class="avatar">김</span>
        <div><strong id="profileName">김민준</strong><small id="profileMeta">2학년 3반 · 학생</small></div>
        <button class="more-button" aria-label="계정 메뉴">···</button>
      </div>
    </aside>

    <div class="shell">
      <header class="topbar">
        <button class="menu-button" id="menuButton" aria-label="메뉴 열기">☰</button>
        <div class="school-info">
          <strong>양청고등학교</strong>
          <span>2026학년도 1학기</span>
        </div>
        <div class="top-actions">
          <label class="role-switch">
            <span>미리보기</span>
            <select id="roleSelect" aria-label="사용자 역할 전환">
              <option value="student">학생</option>
              <option value="teacher">교사</option>
              <option value="admin">관리자</option>
            </select>
          </label>
          <button class="icon-button" id="notificationButton" aria-label="알림">
            <span>♢</span><i id="notificationDot"></i>
          </button>
          <button class="primary compact" data-open-booking>+ 예약하기</button>
        </div>
      </header>

      <main id="mainContent"></main>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>

  <div class="drawer" id="notificationDrawer" aria-hidden="true">
    <div class="drawer-head">
      <div><p class="eyebrow">NOTIFICATIONS</p><h2>알림</h2></div>
      <button class="close-button" data-close-drawer aria-label="닫기">×</button>
    </div>
    <div id="notificationList"></div>
  </div>

  <div class="modal-backdrop" id="bookingModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="bookingTitle">
      <header class="modal-head">
        <div><p class="eyebrow">ROOM RESERVATION</p><h2 id="bookingTitle">특별실 예약 신청</h2></div>
        <button class="close-button" data-close-modal aria-label="닫기">×</button>
      </header>
      <form id="bookingForm">
        <div class="modal-body">
          <div class="form-notice"><span>i</span> 학생 예약은 담당 교사의 승인 후 최종 확정됩니다.</div>
          <div class="form-grid">
            <label><span>신청자</span><input name="name" value="김민준" required></label>
            <label><span>학년 및 반</span><input name="className" value="2학년 3반" required></label>
            <label class="full"><span>특별실</span><select name="roomId" id="roomSelect" required></select></label>
            <label><span>사용 날짜</span><input name="date" id="bookingDate" type="date" required></label>
            <label><span>참가 인원</span><input name="people" type="number" min="1" value="12" required></label>
            <label><span>시작 시간</span><select name="start" id="startTime"></select></label>
            <label><span>종료 시간</span><select name="end" id="endTime"></select></label>
            <label class="full"><span>사용 목적</span><textarea name="purpose" rows="3" placeholder="예: 과학 동아리 실험 준비" required></textarea></label>
          </div>
          <p class="form-error" id="formError" role="alert"></p>
        </div>
        <footer class="modal-foot">
          <button type="button" class="secondary" data-close-modal>취소</button>
          <button type="submit" class="primary">예약 신청하기</button>
        </footer>
      </form>
    </section>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script src="./app.js"></script>
</body>
</html>
